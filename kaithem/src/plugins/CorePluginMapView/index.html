<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map View - Kaithem</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #map {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 100%;
      }

      /* Maplibre overrides for full-screen */
      .maplibregl-ctrl-bottom-right {
        bottom: 20px;
        right: 20px;
      }

      .maplibregl-ctrl-bottom-left {
        bottom: 20px;
        left: 20px;
      }

      .maplibregl-ctrl-top-left {
        top: 20px;
        left: 20px;
      }

      .maplibregl-ctrl-top-right {
        top: 20px;
        right: 20px;
      }

      /* Geocoder styling */
      .maplibregl-ctrl-geocoder {
        font-family: inherit;
        min-width: 300px;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
