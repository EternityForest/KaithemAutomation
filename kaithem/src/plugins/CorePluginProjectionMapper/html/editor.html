<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projection Mapper Editor</title>
    <link rel="stylesheet" href="../static/projection-mapper.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      projection-editor {
        display: block;
        width: 100%;
        height: 100%;
      }

    @font-face {
      font-family: 'DSEG14ClassicMini-Italic';
      font-style: normal;
      font-weight: 400;
      src: url('/static/fonts/DSEG/DSEG14ClassicMini-Italic.ttf');
      /* Chrome 26+, Opera 23+, Firefox 39+ */
    }

      @font-face {
      font-family: 'ModernDOS9x16';
      font-style: normal;
      font-weight: 400;
      src: url('/static/fonts/moderndos/ModernDOS9x16.ttf');
      /* Chrome 26+, Opera 23+, Firefox 39+ */
    }



    </style>
  </head>
  <body>
    <projection-editor></projection-editor>

    <script type="module">
      import ProjectionEditor from "../static/projection-editor.ts";

      const url = new URL(window.location.href);
      const MODULE = url.searchParams.get("module");
      const RESOURCE = url.searchParams.get("resource");

      fetch(`/projection-mapper/api/data/${MODULE}/${RESOURCE}`, {
        method: "GET",
      })
        .then((r) => r.json())
        .then((DATA) => {
          const editor = document.querySelector("projection-editor");
          editor.setInitialState(MODULE, RESOURCE, DATA);
        })
        .catch(() => {
          setTimeout(() => {
            window.location.reload();
          }, 60000);
        });
    </script>
  </body>
</html>
