{% set theming = imp0rt( 'kaithem.src.theming' ) %}
{% set config = imp0rt( 'kaithem.src.config' ).config %}

<html>
  <head>
  <link rel="stylesheet" type="text/css" href="/static/css/barrel.css">
  <link rel="stylesheet" type="text/css" href="/static/css/kaithem.css">
    <link
      rel="stylesheet"
      type="text/css"
      href="/dynamic.css/{{ theming.theme_ver }}"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ theming.getCSSTheme() or config['theme-url'] }}"
    />


    <script
      type="module"
      src="/static/vite/assets/alerts_component.js"
    ></script>
  </head>

  <body>
    <div class="w-full">
      <!-- Lit-based alerts component for dropdown -->
      <kaithem-alerts show-ack-button max-alerts="5"></kaithem-alerts>

      <!-- Lit-based notifications component -->
      <kaithem-notifications source="{{ api.uuid }}"></kaithem-notifications>
    </div>
  </body>
</html>
